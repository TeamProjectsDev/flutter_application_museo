<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Sala no encontrada — Museo Padre Suárez</title>
    <link rel="icon" type="image/png" href="media/icon.png">
    <link rel="stylesheet" href="css/style.css?v=5.1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0b0f1a 100%);
        }
        .error-code {
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 30px rgba(99, 102, 241, 0.3));
        }
        .error-title {
            font-size: 2rem;
            color: white;
            margin-bottom: 1rem;
        }
        .error-msg {
            color: var(--text-dim);
            max-width: 500px;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }
        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
            background: #4f46e5;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Sala no encontrada</h1>
        <p class="error-msg">
            Parece que te has desviado del recorrido oficial del museo. La pieza o documento que buscas no se encuentra en esta vitrina.
        </p>
        <a href="index.html" class="back-btn">
            <span>🏠</span> Volver al Portal Principal
        </a>
    </div>
</body>
</html>
