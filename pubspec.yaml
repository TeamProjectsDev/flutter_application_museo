name: flutter_application_museo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.1.0
  web: ^1.0.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  google_sign_in: ^6.2.1
  easy_localization: ^3.0.7
  flutter_localizations:
    sdk: flutter

  # 3D, VR & AR
  model_viewer_plus: ^1.8.0
  panorama_viewer: ^2.0.7

  # Networking & Caching
  dio: ^5.5.0+1
  path_provider: ^2.1.3
  http: ^1.2.1
  dart_rss: ^3.0.3
  intl: ^0.19.0
  url_launcher: ^6.3.0
  cached_network_image: ^3.4.1

  # Environment variables
  flutter_dotenv: ^5.1.0
  mobile_scanner: ^7.2.0
  home_widget: ^0.9.0
  cloud_firestore: ^5.6.12
  shared_preferences: ^2.5.4
  firebase_analytics: ^11.6.0
  firebase_crashlytics: ^4.1.0
  flutter_native_splash: ^2.4.4
  app_links: ^6.3.4
  qr_flutter: ^4.1.0
  share_plus: ^10.0.2
  google_fonts: ^8.1.0
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/models/
    - assets/vr/
    - assets/icon.png
    - assets/images/
    - assets/translations/
    - assets/data/inventory/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 23
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter_native_splash:
  color: "#DAB585"
  image: "assets/icon.png"
  android: true
  ios: true
  web: false

dependency_overrides:
  intl: ^0.19.0
